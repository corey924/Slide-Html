<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">INIT-SCAN operation screenshot</title>
  <desc id="desc">A screenshot-like AI agent conversation showing INIT-SCAN and a structured scan report.</desc>
  <rect width="1280" height="720" fill="#eef3f6"/>
  <rect x="48" y="36" width="1184" height="648" rx="18" fill="#ffffff" stroke="#d7e2e8"/>
  <rect x="48" y="36" width="1184" height="52" rx="18" fill="#111827"/>
  <circle cx="78" cy="62" r="7" fill="#ff5f56"/>
  <circle cx="101" cy="62" r="7" fill="#ffbd2e"/>
  <circle cx="124" cy="62" r="7" fill="#27c93f"/>
  <text x="160" y="69" fill="#edf5f7" font-family="Consolas, 'Cascadia Mono', monospace" font-size="18">AI Agent — ZeroSpec bootstrap session</text>

  <rect x="84" y="122" width="480" height="470" rx="14" fill="#f7f9fa" stroke="#d7e2e8"/>
  <text x="112" y="160" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="23" font-weight="700">User pasted prompt</text>
  <rect x="112" y="184" width="420" height="322" rx="10" fill="#111827"/>
  <text x="138" y="224" fill="#4ec5d4" font-family="Consolas, 'Cascadia Mono', monospace" font-size="19"># INIT-SCAN</text>
  <text x="138" y="260" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">角色：你是一位資深 SA</text>
  <text x="138" y="294" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">任務：掃描本專案</text>
  <text x="138" y="328" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">輸出結構化狀態報告</text>
  <text x="138" y="380" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">§1 專案現狀摘要</text>
  <text x="138" y="410" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">§2 技術棧萃取</text>
  <text x="138" y="440" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">§3 核心模組與邊界</text>
  <text x="138" y="470" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">§7 開放問題</text>
  <rect x="112" y="528" width="420" height="38" rx="8" fill="#e4f8fb"/>
  <text x="134" y="553" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="17" font-weight="700">第一步：先掃描，不直接寫檔</text>

  <rect x="616" y="122" width="580" height="470" rx="14" fill="#ffffff" stroke="#d7e2e8"/>
  <text x="644" y="160" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="23" font-weight="700">Agent response</text>
  <g font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
    <rect x="644" y="184" width="506" height="62" rx="10" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="666" y="212" fill="#172033" font-size="18" font-weight="700">§1 專案現狀摘要</text>
    <text x="666" y="234" fill="#526173" font-size="15">雙 API Host，共用 Service 層；文件需補導航。</text>

    <rect x="644" y="264" width="506" height="62" rx="10" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="666" y="292" fill="#172033" font-size="18" font-weight="700">§2 技術棧萃取</text>
    <text x="666" y="314" fill="#526173" font-size="15">.NET / ASP.NET Core / EF Core / SQL Server / Redis</text>

    <rect x="644" y="344" width="506" height="62" rx="10" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="666" y="372" fill="#172033" font-size="18" font-weight="700">§3 核心模組與邊界</text>
    <text x="666" y="394" fill="#526173" font-size="15">Controller 只處理 HTTP；業務邏輯集中 Service。</text>

    <rect x="644" y="424" width="506" height="62" rx="10" fill="#e4f8fb" stroke="#8adce5"/>
    <text x="666" y="452" fill="#116d78" font-size="18" font-weight="700">§5 最需規格化的優先項</text>
    <text x="666" y="474" fill="#526173" font-size="15">API/Auth、外部整合、票務查詢契約。</text>

    <text x="644" y="532" fill="#526173" font-size="17">確認掃描結果後，再進入 INIT-BUILD 產生 AGENTS.md。</text>
  </g>
  <text x="84" y="640" fill="#526173" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">操作示意：內容依真實 AGENTS.md 結構重排，已去識別化。</text>
</svg>
