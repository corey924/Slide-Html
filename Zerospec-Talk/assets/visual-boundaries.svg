<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Agent reads project map screenshot</title>
  <desc id="desc">A screenshot-like split view showing an agent reading AGENTS.md and selecting the right module boundary.</desc>
  <rect width="1280" height="720" fill="#eef3f6"/>
  <rect x="48" y="36" width="1184" height="648" rx="18" fill="#ffffff" stroke="#d7e2e8"/>
  <rect x="48" y="36" width="1184" height="48" rx="18" fill="#111827"/>
  <text x="78" y="67" fill="#edf5f7" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">Agent workspace — reading AGENTS.md before code changes</text>

  <rect x="84" y="120" width="520" height="500" rx="14" fill="#111827"/>
  <text x="112" y="160" fill="#4ec5d4" font-family="Consolas, 'Cascadia Mono', monospace" font-size="20">$ agent task</text>
  <text x="112" y="200" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">新增訂單查詢 API 前，請先讀 AGENTS.md。</text>
  <text x="112" y="256" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="18">&gt; Reading AGENTS.md...</text>
  <text x="112" y="292" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="18">&gt; Found Source of Truth:</text>
  <text x="138" y="326" fill="#edf5f7" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">docs/spec/SPEC-003_ticket-booking.md</text>
  <text x="112" y="380" fill="#9fb6c3" font-family="Consolas, 'Cascadia Mono', monospace" font-size="18">&gt; Found architecture boundary:</text>
  <text x="138" y="414" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="17">Controller 僅處理 HTTP</text>
  <text x="138" y="446" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="17">業務邏輯集中 Service</text>
  <text x="138" y="478" fill="#edf5f7" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="17">資料存取走 Repository</text>
  <text x="112" y="544" fill="#4ec5d4" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">下一步：只修改對應模組，不碰無關層。</text>

  <rect x="650" y="120" width="500" height="500" rx="14" fill="#ffffff" stroke="#d7e2e8"/>
  <text x="680" y="164" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="700">AI 讀到的架構邊界</text>
  <g font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
    <rect x="690" y="204" width="380" height="72" rx="10" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="718" y="248" fill="#172033" font-size="22">API Host：Controller / Middleware</text>
    <path d="M880 276 L880 316" stroke="#4ec5d4" stroke-width="5"/>
    <polygon points="870,312 890,312 880,330" fill="#4ec5d4"/>

    <rect x="690" y="330" width="380" height="72" rx="10" fill="#e4f8fb" stroke="#8adce5"/>
    <text x="718" y="374" fill="#116d78" font-size="22" font-weight="700">Service：業務邏輯</text>
    <path d="M880 402 L880 442" stroke="#4ec5d4" stroke-width="5"/>
    <polygon points="870,438 890,438 880,456" fill="#4ec5d4"/>

    <rect x="690" y="456" width="380" height="72" rx="10" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="718" y="500" fill="#172033" font-size="22">Repository：資料存取</text>
  </g>
  <text x="650" y="660" fill="#526173" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">這張示意的是「動手前先讀邊界」，不是自動產生架構圖。</text>
</svg>
