<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">ZeroSpec maintenance reports screenshot</title>
  <desc id="desc">A screenshot-like AI agent report showing UPDATE, AUDIT, and DRIFT outputs.</desc>
  <rect width="1280" height="720" fill="#eef3f6"/>
  <rect x="48" y="36" width="1184" height="648" rx="18" fill="#ffffff" stroke="#d7e2e8"/>
  <rect x="48" y="36" width="1184" height="48" rx="18" fill="#111827"/>
  <text x="78" y="67" fill="#edf5f7" font-family="Consolas, 'Cascadia Mono', monospace" font-size="17">AI Agent — ZeroSpec maintenance review</text>

  <rect x="82" y="112" width="350" height="500" rx="14" fill="#ffffff" stroke="#d7e2e8"/>
  <text x="112" y="158" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="700">UPDATE</text>
  <g font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
    <rect x="112" y="190" width="270" height="48" rx="8" fill="#e4f8fb" stroke="#8adce5"/>
    <text x="132" y="220" fill="#116d78" font-size="18" font-weight="700">AGENTS.md</text>
    <text x="112" y="270" fill="#172033" font-size="18">Project Summary：不變</text>
    <text x="112" y="310" fill="#172033" font-size="18">Quick Constraints：需更新</text>
    <text x="112" y="350" fill="#172033" font-size="18">Domain-to-Code Map：新增項目</text>
    <text x="112" y="390" fill="#172033" font-size="18">Docs Navigation：需同步</text>
    <rect x="112" y="440" width="270" height="78" rx="8" fill="#111827"/>
    <text x="132" y="470" fill="#edf5f7" font-size="16">確認後才寫檔</text>
    <text x="132" y="496" fill="#4ec5d4" font-size="16">保留 C-class 決策</text>
  </g>

  <rect x="466" y="112" width="350" height="500" rx="14" fill="#ffffff" stroke="#d7e2e8"/>
  <text x="496" y="158" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="700">AUDIT</text>
  <g font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
    <rect x="496" y="190" width="270" height="58" rx="8" fill="#e4f8fb" stroke="#8adce5"/>
    <text x="516" y="227" fill="#116d78" font-size="23" font-weight="700">Health score：WARN</text>
    <text x="496" y="285" fill="#172033" font-size="18">1. 長度與結構</text>
    <text x="496" y="323" fill="#172033" font-size="18">2. 規則是否夠明確</text>
    <text x="496" y="361" fill="#172033" font-size="18">3. 必要區塊是否缺漏</text>
    <text x="496" y="399" fill="#172033" font-size="18">4. 路徑連結是否可用</text>
    <rect x="496" y="448" width="270" height="70" rx="8" fill="#f7f9fa" stroke="#d7e2e8"/>
    <text x="516" y="476" fill="#172033" font-size="16">Action：UPDATE / DRIFT</text>
    <text x="516" y="502" fill="#526173" font-size="15">只產報告，不寫檔</text>
  </g>

  <rect x="850" y="112" width="350" height="500" rx="14" fill="#ffffff" stroke="#d7e2e8"/>
  <text x="880" y="158" fill="#116d78" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="25" font-weight="700">DRIFT</text>
  <g font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif">
    <rect x="880" y="190" width="270" height="58" rx="8" fill="#fff7dc" stroke="#e2b94b"/>
    <text x="900" y="227" fill="#8a5a00" font-size="23" font-weight="700">Overall：DRIFTED</text>
    <text x="880" y="285" fill="#172033" font-size="18">Endpoint：CLEAN</text>
    <text x="880" y="323" fill="#172033" font-size="18">Schema：DRIFT</text>
    <text x="880" y="361" fill="#172033" font-size="18">Permission：CLEAN</text>
    <text x="880" y="399" fill="#172033" font-size="18">Changelog：STALE</text>
    <rect x="880" y="448" width="270" height="70" rx="8" fill="#111827"/>
    <text x="900" y="476" fill="#edf5f7" font-size="16">Next：run SPEC Prompt</text>
    <text x="900" y="502" fill="#4ec5d4" font-size="16">修完再跑 DRIFT</text>
  </g>

  <text x="82" y="656" fill="#526173" font-family="'Noto Sans TC', 'Microsoft JhengHei', sans-serif" font-size="18">維護不是每天補文件，而是專案變動時跑對應 Prompt Pack，先看報告再決定。</text>
</svg>
